# Run with: docker compose up --build
# Copy .env.example to .env and fill in secrets before running.

services:
    rabbitmq:
        image: rabbitmq:3-management-alpine
        restart: always
        container_name: rabbitmq
        ports:
            - "5672:5672"
            - "15672:15672"
        environment:
            - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-guest}
            - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS:-guest}
        healthcheck:
            test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
            interval: 15s
            timeout: 10s
            retries: 10
            start_period: 30s

    nosql-db:
        image: mongo:6
        restart: always
        container_name: nosql-db
        ports:
            - "27017:27017"
        volumes:
            - ./mongo-db:/data/db
        healthcheck:
            test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 20s

    redis:
        image: redis:7-alpine
        restart: always
        container_name: redis
        ports:
            - "6379:6379"
        volumes:
            - ./redis-db:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5

    postgres-db:
        image: postgres:14.1-alpine
        restart: always
        container_name: postgres-db
        environment:
            - POSTGRES_USER=${POSTGRES_USER:-notification}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-notification}
            - POSTGRES_DB=${POSTGRES_DB:-notifications}
        ports:
            - "5432:5432"
        volumes:
            - ./psql-db:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-notification}"]
            interval: 10s
            timeout: 5s
            retries: 5

    customer:
        build:
            context: ./customer
            dockerfile: Dockerfile
        ports:
            - "8001:8001"
        container_name: customer
        restart: on-failure
        environment:
            - PORT=8001
            - MONGODB_URI=mongodb://nosql-db:27017/customer
            - APP_SECRET=${APP_SECRET:-ecommerce_super_secret_change_in_prod}
            - RABBIT_MQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
            - REDIS_HOST=redis
            - REDIS_PORT=6379
        depends_on:
            nosql-db:
                condition: service_healthy
            redis:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy

    products:
        build:
            context: ./products
            dockerfile: Dockerfile
        ports:
            - "8002:8002"
        container_name: products
        restart: on-failure
        environment:
            - PORT=8002
            - MONGODB_URI=mongodb://nosql-db:27017/products
            - APP_SECRET=${APP_SECRET:-ecommerce_super_secret_change_in_prod}
            - RABBIT_MQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
            - REDIS_HOST=redis
            - REDIS_PORT=6379
        depends_on:
            nosql-db:
                condition: service_healthy
            redis:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy

    shopping:
        build:
            context: ./shopping
            dockerfile: Dockerfile
        ports:
            - "8003:8003"
        container_name: shopping
        restart: on-failure
        environment:
            - PORT=8003
            - MONGODB_URI=mongodb://nosql-db:27017/shopping
            - APP_SECRET=${APP_SECRET:-ecommerce_super_secret_change_in_prod}
            - RABBIT_MQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
            - GATEWAY_URL=http://nginx:80
        depends_on:
            nosql-db:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy

    payments:
        build:
            context: ./payments
            dockerfile: Dockerfile
        ports:
            - "8004:8004"
        container_name: payments
        restart: on-failure
        environment:
            - PORT=8004
            - MONGODB_URI=mongodb://nosql-db:27017/payments
            - APP_SECRET=${APP_SECRET:-ecommerce_super_secret_change_in_prod}
            - RABBIT_MQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
            - RAZORPAY_API_KEY=${RAZORPAY_API_KEY:-}
            - RAZORPAY_API_SECRET=${RAZORPAY_API_SECRET:-}
        depends_on:
            nosql-db:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy

    mail:
        build:
            context: ./mail
            dockerfile: Dockerfile
        container_name: mail
        restart: on-failure
        environment:
            - RABBIT_MQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
            - DB_URL=postgres://${POSTGRES_USER:-notification}:${POSTGRES_PASSWORD:-notification}@postgres-db:5432/${POSTGRES_DB:-notifications}
        depends_on:
            postgres-db:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy

    nginx:
        image: nginx:alpine
        restart: always
        container_name: nginx
        volumes:
            - "./nginx/default.conf:/etc/nginx/conf.d/default.conf"
        ports:
            - "8000:80"
        depends_on:
            - customer
            - products
            - shopping
            - payments

    ui:
        build:
            context: ./ui
            dockerfile: Dockerfile
        ports:
            - "3001:80"
        container_name: ui
        restart: always
        depends_on:
            - nginx
