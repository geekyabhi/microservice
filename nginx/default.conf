# Use Docker's embedded DNS so upstreams are resolved at request time,
# not at startup — prevents nginx from failing when a service restarts.
resolver 127.0.0.11 valid=30s ipv6=off;

server {
    listen 80;

    location /customer {
        set $upstream http://customer:8001;
        rewrite ^/customer/(.*) /$1 break;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass $upstream;
    }

    location /products {
        set $upstream http://products:8002;
        rewrite ^/products/(.*) /$1 break;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass $upstream;
    }

    location /shopping {
        set $upstream http://shopping:8003;
        rewrite ^/shopping/(.*) /$1 break;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass $upstream;
    }

    location /payments {
        set $upstream http://payments:8004;
        rewrite ^/payments/(.*) /$1 break;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass $upstream;
    }

    location / {
        set $upstream http://products:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass $upstream;
    }
}
